{% extends "layout.html" %}

{% block content %}
<div class="row align-items-center mb-5">
    <div class="col-md-8">
        <h1 class="display-6 fw-bold font-outfit m-0">Fixed Deposit <span class="text-primary">Vault</span></h1>
        <p class="text-secondary mt-1">Manage stable assets with predictive maturity forecasting and interest analytics.</p>
    </div>
    <div class="col-md-4 text-md-end">
        <button class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-soft" data-bs-toggle="modal" data-bs-target="#addFDModal">
             <i data-lucide="shield-check" size="18" class="me-2"></i> Lock New Deposit
        </button>
    </div>
</div>

<div id="fd-content" class="row g-4 mb-5">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary opacity-50 mb-3" role="status"></div>
        <p class="text-secondary small fw-medium tracking-widest uppercase">Syncing with Secure Vault...</p>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="addFDModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-5 shadow-lg overflow-hidden">
             <div class="modal-header border-0 p-5 pb-0">
                <h3 class="fw-bold font-outfit m-0 tracking-tight">Lock New Certificate</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-5">
                <form id="fd-form" class="space-y-4">
                    <div class="mb-4">
                        <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Bank / Issuing Entity</label>
                        <input type="text" class="form-control rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="bank_name" placeholder="e.g. HDFC Bank, SBI" required>
                    </div>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-6">
                            <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Principal Amont (₹)</label>
                            <input type="number" class="form-control rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="principal" required>
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Interest Rate (%)</label>
                            <input type="number" step="0.01" class="form-control rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="interest_rate" required>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-6">
                            <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Start Date</label>
                            <input type="date" class="form-control rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="start_date" required>
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Maturity Date</label>
                            <input type="date" class="form-control rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="maturity_date" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="small fw-bold text-secondary mb-2 uppercase tracking-widest">Category</label>
                        <select class="form-select rounded-4 py-3 bg-body-tertiary border-0 shadow-none px-3" id="category">
                            <option value="Standard">Standard Deposit</option>
                            <option value="Tax Saver">Tax Saver (5Y)</option>
                            <option value="Corporate">Corporate FD</option>
                            <option value="Senior Citizen">Senior Citizen</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow-soft">
                        Authorize & Deposit
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const fetchFDs = async () => {
        try {
            const { data } = await API.get('/investments/fd');
            const container = document.getElementById('fd-content');
            
            // Calculate Aggregate Stats
            const totalPrincipal = data.fds.reduce((sum, f) => sum + f.principal, 0);
            const totalFds = data.fds.length;
            
            // Simplified Accrued Interest (Approximation for the demo)
            let accruedInterest = 0;
            const now = new Date();
            data.fds.forEach(f => {
                const start = new Date(f.start_date);
                const mat = new Date(f.maturity_date);
                const daysTotal = (mat - start) / (1000 * 60 * 60 * 24);
                const daysPassed = (now - start) / (1000 * 60 * 60 * 24);
                if (daysPassed > 0) {
                     // Simple daily linear interest for UI stats
                     const daily = (f.principal * (f.interest_rate/100)) / 365;
                     accruedInterest += daily * daysPassed;
                }
            });

            const weightedRate = totalPrincipal > 0 
                ? (data.fds.reduce((sum, f) => sum + (f.interest_rate * f.principal), 0) / totalPrincipal).toFixed(2)
                : 0;

            const nextMat = data.fds.length > 0 
                ? Math.ceil((new Date(data.fds[0].maturity_date) - now)/(1000*60*60*24)) 
                : 'N/A';

            container.innerHTML = `
                <!-- Summary Widgets -->
                <div class="col-lg-3">
                    <div class="floating-card p-4 text-center h-100">
                        <p class="text-secondary small fw-bold uppercase tracking-widest mb-2">LOCKED PRINCIPAL</p>
                        <h2 class="fw-bold font-outfit m-0 text-main">₹${totalPrincipal.toLocaleString()}</h2>
                        <div class="small text-muted mt-2">Across ${totalFds} Certificates</div>
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="floating-card p-4 text-center h-100 border-start-neon">
                        <p class="text-secondary small fw-bold uppercase tracking-widest mb-2">ACCRUED INTEREST</p>
                        <h2 class="fw-bold font-outfit m-0 text-success">₹${Math.round(accruedInterest).toLocaleString()}</h2>
                        <div class="small text-success fw-bold">Live Approximation</div>
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="floating-card p-4 text-center h-100">
                        <p class="text-secondary small fw-bold uppercase tracking-widest mb-2">WEIGHTED AVG RATE</p>
                        <h2 class="fw-bold font-outfit m-0 text-primary">${weightedRate}%</h2>
                        <div class="small text-muted mt-2">v/s 6.8% Market Avg</div>
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="floating-card p-4 text-center h-100">
                        <p class="text-secondary small fw-bold uppercase tracking-widest mb-2">NEXT MATURITY</p>
                        <h2 class="fw-bold font-outfit m-0 text-warning">${nextMat} ${nextMat !== 'N/A' ? 'Days' : ''}</h2>
                        <div class="small text-muted mt-2">${data.fds[0]?.maturity_date || '-'}</div>
                    </div>
                </div>

                <div class="col-lg-8 mt-5">
                    <div class="floating-card p-0 overflow-hidden h-100">
                        <div class="px-5 py-4 border-bottom d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold m-0 font-outfit">Active Deposit Portfolio</h5>
                            <span class="badge-custom badge-forecasted">Real-time Valuation</span>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-body-tertiary">
                                    <tr>
                                        <th class="px-5 py-4 small fw-bold text-secondary uppercase tracking-widest border-0">BANK / ENTITY</th>
                                        <th class="px-4 py-4 small fw-bold text-secondary uppercase tracking-widest border-0 text-center">RATE</th>
                                        <th class="px-4 py-4 small fw-bold text-secondary uppercase tracking-widest border-0">MATURITY</th>
                                        <th class="px-5 py-4 small fw-bold text-secondary uppercase tracking-widest border-0 text-end">AMOUNT</th>
                                    </tr>
                                </thead>
                                <tbody class="border-0">
                                    ${data.fds.map(f => {
                                        const progress = Math.min(100, Math.max(0, ((now - new Date(f.start_date)) / (new Date(f.maturity_date) - new Date(f.start_date))) * 100));
                                        return `
                                        <tr class="animate-fade-in">
                                            <td class="px-5 py-4">
                                                <div class="d-flex align-items-center gap-3">
                                                    <div class="p-2 rounded-3 bg-primary bg-opacity-10 text-primary"><i data-lucide="landmark" size="20"></i></div>
                                                    <div>
                                                        <div class="fw-bold">${f.bank_name}</div>
                                                        <div class="small text-secondary">${f.category}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="px-4 py-4 text-center"><span class="badge rounded-pill bg-soft-success text-success px-3">${f.interest_rate}%</span></td>
                                            <td class="px-4 py-4">
                                                <div class="small fw-medium">${f.maturity_date}</div>
                                                <div class="progress mt-1" style="height: 4px; background: rgba(0,0,0,0.05);">
                                                    <div class="progress-bar ${progress > 80 ? 'bg-warning' : 'bg-primary'}" style="width: ${progress}%"></div>
                                                </div>
                                            </td>
                                            <td class="px-5 py-4 text-end fw-bold font-outfit">₹${f.principal.toLocaleString()}</td>
                                        </tr>
                                        `;
                                    }).join('') || '<tr><td colspan="4" class="text-center py-5 opacity-50">No deposits found in vault.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4 mt-5">
                    <div class="floating-card p-5 h-100">
                        <h5 class="fw-bold mb-4 font-outfit">Maturity Calculator</h5>
                        <div class="space-y-4">
                            <div class="mb-3">
                                <label class="small text-secondary fw-bold uppercase tracking-widest mb-2 d-block">Principal Amount</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body-tertiary border-0 rounded-start-4"><i data-lucide="indian-rupee" size="16"></i></span>
                                    <input type="number" id="calc-principal" class="form-control bg-body-tertiary border-0 rounded-end-4 py-2" value="100000">
                                </div>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label class="small text-secondary fw-bold uppercase tracking-widest mb-2 d-block">Rate (%)</label>
                                    <input type="number" id="calc-rate" class="form-control bg-body-tertiary border-0 rounded-4 py-2" value="7.1">
                                </div>
                                <div class="col-6">
                                    <label class="small text-secondary fw-bold uppercase tracking-widest mb-2 d-block">Years</label>
                                    <input type="number" id="calc-years" class="form-control bg-body-tertiary border-0 rounded-4 py-2" value="5">
                                </div>
                            </div>
                            <div class="p-4 rounded-5 mt-5" style="background: rgba(var(--bg-card-rgb), 0.5); border: 1px dashed var(--neon-cyan);">
                                <p class="text-secondary small mb-1">Projected Maturity</p>
                                <h2 class="fw-bold font-outfit m-0" id="calc-result" style="color: var(--neon-cyan);">₹1,41,564</h2>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            initCalculator();
        } catch (err) {
            console.error(err);
        }
    };

    document.getElementById('fd-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            bank_name: e.target.bank_name.value,
            principal: e.target.principal.value,
            interest_rate: e.target.interest_rate.value,
            start_date: e.target.start_date.value,
            maturity_date: e.target.maturity_date.value,
            category: e.target.category.value
        };
        try {
            await API.post('/investments/fd', payload);
            const modal = bootstrap.Modal.getInstance(document.getElementById('addFDModal'));
            modal.hide();
            fetchFDs();
        } catch (err) { 
            console.error(err);
            alert('Operation failed: ' + (err.response?.data?.error || 'Unknown error')); 
        }
    });

    const initCalculator = () => {
        const principal = document.getElementById('calc-principal');
        const rate = document.getElementById('calc-rate');
        const years = document.getElementById('calc-years');
        const result = document.getElementById('calc-result');
        if(!principal) return;
        const update = () => {
            const p = parseFloat(principal.value);
            const r = parseFloat(rate.value) / 100;
            const t = parseFloat(years.value);
            if (p && r && t) {
                const amount = p * Math.pow((1 + r/4), 4 * t);
                result.innerText = `₹${Math.round(amount).toLocaleString()}`;
            }
        };
        [principal, rate, years].forEach(el => el.addEventListener('input', update));
        update();
    };

    fetchFDs();
</script>
{% endblock %}
